<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Off the menu · LHONG TOU</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root{--ink:#0c0703;--paper:#faf6ee;--red:#c5331e;--gold:#e6c068;--cream:#f4ede0}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:Georgia,serif;display:grid;place-items:center;padding:2rem;text-align:center}
  h1{font-size:clamp(3rem,12vw,8rem);margin:0;letter-spacing:-.03em;line-height:.9;color:var(--red)}
  .ch{font-family:'Noto Serif SC',serif;font-size:clamp(2rem,8vw,5rem);color:var(--gold);margin:0 0 .5rem}
  p{max-width:36ch;color:#5c3a1f;font-size:1.05rem;line-height:1.55}
  a{display:inline-block;margin-top:1.5rem;padding:.85rem 1.4rem;background:var(--ink);color:var(--cream);text-decoration:none;border-radius:999px;letter-spacing:.06em;font-size:.85rem;text-transform:uppercase}
  .tag{display:inline-block;padding:.3rem .7rem;background:var(--red);color:var(--cream);font-family:'Courier New',monospace;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;border-radius:4px;margin-bottom:1.2rem}
</style>
</head>
<body>
  <main>
    <span class="tag">off the menu</span>
    <p class="ch">迷路了</p>
    <h1>404</h1>
    <p>This dish isn't on the menu. Head back to the dragon's head and we'll pour you a Thai milk tea.</p>
